<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <!-- Transparent background -->

  <!-- Orange oval planet body -->
  <ellipse cx="250" cy="255" rx="175" ry="215" fill="#F47C20"/>

  <!-- White orbital ring (back half) -->
  <ellipse cx="250" cy="260" rx="260" ry="75" fill="none" stroke="white" stroke-width="22" stroke-dasharray="810 1000" stroke-dashoffset="-100" opacity="0.95"/>

  <!-- Rocket/bird shape (black) -->
  <!-- Main body -->
  <path d="
    M 250 80
    C 250 80, 290 130, 295 195
    L 295 290
    C 295 290, 270 310, 250 320
    C 230 310, 205 290, 205 290
    L 205 195
    C 210 130, 250 80, 250 80 Z
  " fill="#1a1a1a"/>

  <!-- Center highlight stripe -->
  <path d="
    M 250 100
    C 252 130, 258 160, 260 200
    L 260 280
    C 257 290, 253 300, 250 308
    C 248 300, 246 290, 244 280
    L 244 200
    C 246 160, 248 130, 250 100 Z
  " fill="#F47C20" opacity="0.6"/>

  <!-- Left wing -->
  <path d="
    M 207 210
    C 185 220, 160 240, 145 270
    C 155 265, 170 258, 185 255
    L 205 280
    Z
  " fill="#1a1a1a"/>

  <!-- Right wing -->
  <path d="
    M 293 210
    C 315 220, 340 240, 355 270
    C 345 265, 330 258, 315 255
    L 295 280
    Z
  " fill="#1a1a1a"/>

  <!-- Rocket nose tip -->
  <path d="M 250 75 C 244 90, 243 105, 250 118 C 257 105, 256 90, 250 75 Z" fill="#1a1a1a"/>

  <!-- Bottom flame/exhaust -->
  <path d="
    M 225 315
    C 225 315, 235 345, 250 355
    C 265 345, 275 315, 275 315
    C 265 322, 255 325, 250 325
    C 245 325, 235 322, 225 315 Z
  " fill="#1a1a1a"/>

  <!-- White orbital ring (front half) -->
  <ellipse cx="250" cy="260" rx="260" ry="75" fill="none" stroke="white" stroke-width="22" stroke-dasharray="405 1000" stroke-dashoffset="305" opacity="0.95"/>

</svg>
